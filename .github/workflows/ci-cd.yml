  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List directory structure
        run: ls -R
        working-directory: nodejs 

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: nodejs

      - name: Run linter
        run: npm run lint
        working-directory: nodejs
        continue-on-error: true

      - name: Run tests
        run: npm test
        working-directory: nodejs
        continue-on-error: true

  docker-build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    # needs: [terraform-validate, node-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-full: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch 
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest

      
      - name: Display the image url
        run: echo "${{ secrets.IMAGE_NAME }}${{ github.run_id }}"



      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./nodejs
          push: true
          tags:  ${{ env.IMAGE_NAME }}:${{ github.run_id }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
  deploy-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        env:
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image-tag }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          envs: DOCKER_IMAGE,IMAGE_TAG
          script: |
            cd ~/nodejs-app
            export DOCKER_IMAGE="$DOCKER_IMAGE"
            export IMAGE_TAG="$IMAGE_TAG"
            docker compose pull
            docker compose down
            docker compose up -d
            echo "✅ EC2 deployment completed with image tag: $IMAGE_TAG"

  deploy-vagrant:
    name: Deploy to Vagrant VM
    runs-on: ubuntu-latest
    needs: docker-build-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vagrant VM
        uses: appleboy/ssh-action@master
        env:
          DOCKER_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ needs.docker-build-push.outputs.image-tag }}
        with:
          host: ${{ secrets.VAGRANT_HOST }}
          username: ${{ secrets.VAGRANT_USER }}
          key: ${{ secrets.VAGRANT_PRIVATE_KEY }}
          port: ${{ secrets.VAGRANT_PORT }}
          envs: DOCKER_IMAGE,IMAGE_TAG
          script: |
            cd ~/nodejs-app
            export DOCKER_IMAGE="$DOCKER_IMAGE"
            export IMAGE_TAG="$IMAGE_TAG"
            docker compose pull
            docker compose down
            docker compose up -d
            echo "✅ Vagrant VM deployment completed with image tag: $IMAGE_TAG"

  docker-compose-deploy:
    name: Run Docker Compose
    runs-on: ubuntu-latest
    needs: [deploy-ec2, deploy-vagrant]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Run Docker Compose Locally (for validation)
        run: |
          cd nodejs
          docker compose up -d
          sleep 5
          docker compose down
          echo "✅ Docker Compose validation passed"

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [node-tests, docker-build-push, deploy-ec2, deploy-vagrant, docker-compose-deploy]
    if: always() && success()
    steps:
      - name: Success notification
        run: |
          echo "🎉 CI/CD Pipeline completed successfully!"
          echo "✅ Terraform validated"
          echo "✅ Node tests passed"
          echo "✅ Docker image built and pushed"
          echo "✅ EC2 deployment successful"
          echo "✅ Vagrant VM deployment successful"
          echo "✅ Docker Compose running"
